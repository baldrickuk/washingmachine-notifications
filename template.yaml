AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Washing machine filter cleaning reminder system

Parameters:
  WifeEmail:
    Type: String
    Description: Wife's email address
  WifePhone:
    Type: String
    Description: Wife's mobile number in E.164 format (e.g. +447700900000)
  FromEmail:
    Type: String
    Description: Verified SES sender email address
  AnimalType:
    Type: String
    Default: bunny
    Description: Animal photo to reward the recipient with on confirmation (bunny, cat, dog, fox)
  TwilioEnabled:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Set to true to enable Twilio SMS
  TwilioAccountSid:
    Type: String
    Default: "unused"
    Description: Twilio Account SID (optional — SMS disabled if blank)
  TwilioAuthToken:
    Type: String
    Default: "unused"
    NoEcho: true
    Description: Twilio Auth Token (optional)
  TwilioFromNumber:
    Type: String
    Default: "unused"
    Description: Twilio phone number to send SMS from in E.164 format (optional)
  WhatsAppPhoneNumberId:
    Type: String
    Default: ""
    Description: Meta WhatsApp Business phone number ID (optional — enables WhatsApp mode)
  WhatsAppAccessToken:
    Type: String
    Default: ""
    NoEcho: true
    Description: Meta System User access token for WhatsApp Cloud API (optional)
  WhatsAppReminderTemplate:
    Type: String
    Default: filter_reminder
    Description: Approved Meta template name for the initial Sunday reminder
  WhatsAppEscalationTemplate:
    Type: String
    Default: filter_escalation
    Description: Approved Meta template name for daily escalation reminders
  WhatsAppCongratsTemplate:
    Type: String
    Default: filter_confirmed
    Description: Approved Meta template name for the congratulations message
  AlertEmail:
    Type: String
    Description: Email address to receive operational alerts (Lambda errors, DLQ depth, throttling)

Globals:
  Function:
    Runtime: python3.12
    Architectures: [arm64]
    Timeout: 30
    Environment:
      Variables:
        TABLE_NAME: !Ref RemindersTable
        FROM_EMAIL: !Ref FromEmail
        ANIMAL_TYPE: !Ref AnimalType
        TWILIO_ACCOUNT_SID: !Ref TwilioAccountSid
        TWILIO_FROM_NUMBER: !Ref TwilioFromNumber
        TWILIO_ENABLED: !Ref TwilioEnabled
        WHATSAPP_PHONE_NUMBER_ID: !Ref WhatsAppPhoneNumberId
        WHATSAPP_REMINDER_TEMPLATE: !Ref WhatsAppReminderTemplate
        WHATSAPP_ESCALATION_TEMPLATE: !Ref WhatsAppEscalationTemplate
        WHATSAPP_CONGRATS_TEMPLATE: !Ref WhatsAppCongratsTemplate
        SECRETS_ARN: !Ref AppSecrets

Resources:
  RemindersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-reminders"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: AppPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                Resource: !GetAtt RemindersTable.Arn
              - Effect: Allow
                Action: ses:SendEmail
                Resource: '*'
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Ref AppSecrets
              - Effect: Allow
                Action: sqs:SendMessage
                Resource: !GetAtt LambdaDLQ.Arn

  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${AWS::StackName}-alerts"
      Subscription:
        - Protocol: email
          Endpoint: !Ref AlertEmail

  LambdaDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${AWS::StackName}-dlq"
      MessageRetentionPeriod: 1209600  # 14 days

  AppSecrets:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${AWS::StackName}/secrets"
      Description: Sensitive API credentials — Twilio and WhatsApp tokens
      SecretString: !Sub |
        {
          "twilio_auth_token": "${TwilioAuthToken}",
          "whatsapp_access_token": "${WhatsAppAccessToken}",
          "wife_email": "${WifeEmail}",
          "wife_phone": "${WifePhone}"
        }

  ConfirmCloudFront:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "${AWS::StackName} — GB-only confirmation endpoint"
        PriceClass: PriceClass_100
        DefaultCacheBehavior:
          TargetOriginId: ApiGatewayOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD]
          # CachingDisabled — confirmation links must always hit the origin
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
          # AllViewerExceptHostHeader — forwards query strings, skips Host so API GW gets its own hostname
          OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
        Origins:
          - Id: ApiGatewayOrigin
            DomainName: !Sub "${ConfirmApi}.execute-api.${AWS::Region}.amazonaws.com"
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
        Restrictions:
          GeoRestriction:
            RestrictionType: whitelist
            Locations:
              - GB

  ConfirmApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      DefaultRouteSettings:
        ThrottlingRateLimit: 5
        ThrottlingBurstLimit: 10

  SendWeeklyEmailFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/handlers/
      Handler: app.send_weekly_email
      Role: !GetAtt LambdaRole.Arn
      DeadLetterQueue:
        Type: SQS
        TargetArn: !GetAtt LambdaDLQ.Arn
      Environment:
        Variables:
          API_BASE_URL: !Sub "https://${ConfirmCloudFront.DomainName}"
      Events:
        # Two schedules to handle GMT/BST — Lambda checks actual UK time and skips if wrong hour
        SundayEmailBST:
          Type: Schedule
          Properties:
            Schedule: cron(0 8 ? * SUN *)
            Description: Sunday 09:00 BST (08:00 UTC)
            Enabled: true
        SundayEmailGMT:
          Type: Schedule
          Properties:
            Schedule: cron(0 9 ? * SUN *)
            Description: Sunday 09:00 GMT (09:00 UTC)
            Enabled: true

  SendDailySMSFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/handlers/
      Handler: app.send_daily_sms
      Role: !GetAtt LambdaRole.Arn
      DeadLetterQueue:
        Type: SQS
        TargetArn: !GetAtt LambdaDLQ.Arn
      Events:
        DailySMSBST:
          Type: Schedule
          Properties:
            Schedule: cron(0 7 ? * * *)
            Description: Daily 08:00 BST (07:00 UTC)
            Enabled: true
        DailySMSGMT:
          Type: Schedule
          Properties:
            Schedule: cron(0 8 ? * * *)
            Description: Daily 08:00 GMT (08:00 UTC)
            Enabled: true
        # Enable this rule manually in the AWS Console to run a test cycle.
        # First invoke SendWeeklyEmailFunction with {"test": true} to seed the test record,
        # then enable this rule — it fires every 10 minutes and sends escalating SMS messages.
        # Disable again when done.
        TestSMSEvery10Min:
          Type: Schedule
          Properties:
            Schedule: rate(10 minutes)
            Description: "TEST ONLY — disabled by default, enable via console to verify escalating SMS"
            Enabled: false
            Input: '{"test": true}'

  ConfirmTaskFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/handlers/
      Handler: app.confirm_task
      Role: !GetAtt LambdaRole.Arn
      Events:
        ConfirmGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref ConfirmApi
            Path: /confirm
            Method: GET

  # --- CloudWatch Alarms ---

  WeeklyEmailErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-weekly-email-errors"
      AlarmDescription: SendWeeklyEmail Lambda has errors — the Sunday reminder may not have been sent
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref SendWeeklyEmailFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic

  DailySMSErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-daily-sms-errors"
      AlarmDescription: SendDailySMS Lambda has errors — a daily reminder may not have been sent
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref SendDailySMSFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic

  ConfirmTaskErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-confirm-task-errors"
      AlarmDescription: ConfirmTask Lambda has errors — a confirmation attempt may have failed
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref ConfirmTaskFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic

  DLQDepthAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-dlq-depth"
      AlarmDescription: Lambda DLQ is non-empty — a function failed after all retries
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt LambdaDLQ.QueueName
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic

  ApiGatewayThrottleAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-api-throttling"
      AlarmDescription: API Gateway is returning 4xx responses — rate limit may be hit (CloudFront throttling)
      Namespace: AWS/ApiGateway
      MetricName: 4xx
      Dimensions:
        - Name: ApiId
          Value: !Ref ConfirmApi
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic

Outputs:
  ConfirmUrl:
    Description: Public confirmation endpoint (CloudFront — GB only)
    Value: !Sub "https://${ConfirmCloudFront.DomainName}"
  ConfirmApiUrl:
    Description: API Gateway origin URL (direct — no geo restriction)
    Value: !Sub "https://${ConfirmApi}.execute-api.${AWS::Region}.amazonaws.com"
  RemindersTableName:
    Description: DynamoDB table name
    Value: !Ref RemindersTable
