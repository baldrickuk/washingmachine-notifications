AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Washing machine filter cleaning reminder system

Parameters:
  WifeEmail:
    Type: String
    Description: Wife's email address
  WifePhone:
    Type: String
    Description: Wife's mobile number in E.164 format (e.g. +447700900000)
  FromEmail:
    Type: String
    Description: Verified SES sender email address

Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    Environment:
      Variables:
        TABLE_NAME: !Ref RemindersTable
        WIFE_EMAIL: !Ref WifeEmail
        WIFE_PHONE: !Ref WifePhone
        FROM_EMAIL: !Ref FromEmail

Resources:
  RemindersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-reminders"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: AppPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                Resource: !GetAtt RemindersTable.Arn
              - Effect: Allow
                Action: ses:SendEmail
                Resource: '*'
              - Effect: Allow
                Action: sns:Publish
                Resource: '*'

  ConfirmApi:
    Type: AWS::Serverless::HttpApi

  SendWeeklyEmailFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/handlers/
      Handler: app.send_weekly_email
      Role: !GetAtt LambdaRole.Arn
      Environment:
        Variables:
          API_BASE_URL: !Sub "https://${ConfirmApi}.execute-api.${AWS::Region}.amazonaws.com"
      Events:
        # Two schedules to handle GMT/BST — Lambda checks actual UK time and skips if wrong hour
        SundayEmailBST:
          Type: Schedule
          Properties:
            Schedule: cron(0 8 ? * SUN *)
            Description: Sunday 09:00 BST (08:00 UTC)
            Enabled: true
        SundayEmailGMT:
          Type: Schedule
          Properties:
            Schedule: cron(0 9 ? * SUN *)
            Description: Sunday 09:00 GMT (09:00 UTC)
            Enabled: true

  SendDailySMSFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/handlers/
      Handler: app.send_daily_sms
      Role: !GetAtt LambdaRole.Arn
      Events:
        DailySMSBST:
          Type: Schedule
          Properties:
            Schedule: cron(0 7 ? * * *)
            Description: Daily 08:00 BST (07:00 UTC)
            Enabled: true
        DailySMSGMT:
          Type: Schedule
          Properties:
            Schedule: cron(0 8 ? * * *)
            Description: Daily 08:00 GMT (08:00 UTC)
            Enabled: true
        # Enable this rule manually in the AWS Console to run a test cycle.
        # First invoke SendWeeklyEmailFunction with {"test": true} to seed the test record,
        # then enable this rule — it fires every 10 minutes and sends escalating SMS messages.
        # Disable again when done.
        TestSMSEvery10Min:
          Type: Schedule
          Properties:
            Schedule: rate(10 minutes)
            Description: "TEST ONLY — disabled by default, enable via console to verify escalating SMS"
            Enabled: false
            Input: '{"test": true}'

  ConfirmTaskFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/handlers/
      Handler: app.confirm_task
      Role: !GetAtt LambdaRole.Arn
      Events:
        ConfirmGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref ConfirmApi
            Path: /confirm
            Method: GET

Outputs:
  ConfirmApiUrl:
    Description: API Gateway base URL
    Value: !Sub "https://${ConfirmApi}.execute-api.${AWS::Region}.amazonaws.com"
  RemindersTableName:
    Description: DynamoDB table name
    Value: !Ref RemindersTable
