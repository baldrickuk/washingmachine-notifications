name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install handler dependencies
        run: pip install -r src/handlers/requirements.txt

      - name: Install test dependencies
        run: pip install -r tests/requirements.txt

      - name: Install pylint
        run: pip install pylint

      - name: Lint
        run: pylint src/handlers/app.py

      - name: Test
        run: python -m pytest tests/ -v --cov=src/handlers --cov-report=term-missing

  terraform-validate:
    name: Terraform / OpenTofu Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.7.0"

      - name: Build Lambda package
        run: bash terraform/build.sh

      - name: tofu init
        run: tofu init -backend=false
        working-directory: terraform

      - name: tofu fmt check
        run: tofu fmt -check -recursive
        working-directory: terraform

      - name: tofu validate
        run: tofu validate
        working-directory: terraform

  # To enable deployment, configure these GitHub Actions secrets:
  #   TF_VAR_wife_email       — recipient email
  #   TF_VAR_wife_phone       — recipient phone (+44...)
  #   TF_VAR_from_email       — verified SES sender
  #   TF_VAR_alert_email      — operational alert email
  #   TF_VAR_twilio_auth_token
