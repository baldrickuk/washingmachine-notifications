name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install handler dependencies
        run: pip install -r src/handlers/requirements.txt

      - name: Install test dependencies
        run: pip install -r tests/requirements.txt

      - name: Install pylint
        run: pip install pylint

      - name: Lint
        run: pylint src/handlers/app.py

      - name: Test
        run: python -m pytest tests/ -v --cov=src/handlers --cov-report=term-missing

  build:
    name: SAM Build
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: SAM build
        run: sam build

  # To enable deployment, add the following GitHub Actions secrets:
